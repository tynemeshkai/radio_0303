user www-data;
worker_processes auto;

# 1. СНИМАЕМ ЛИМИТЫ ОС: Разрешаем Nginx открывать до 65535 файлов/сокетов
worker_rlimit_nofile 65535; 

pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    # 2. РАСШИРЯЕМ КАНАЛ: Держим до 8192 соединений на каждый поток процессора
    worker_connections 8192; 
    
    # Заставляем воркер принимать все новые соединения разом, а не по одному
    multi_accept on; 
}

http {
    ##
    # Basic Settings
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # 3. АСИНХРОННОЕ ЧТЕНИЕ (AIO): Идеально для раздачи HLS (.ts) из /dev/shm
    aio threads;

    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL Settings
    ##
    ssl_protocols TLSv1.2 TLSv1.3; 
    ssl_prefer_server_ciphers on;

    ##
    # Logging Settings
    ##
    access_log /var/log/nginx/access.log;

    ##
    # Gzip Settings
    ##
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/vnd.apple.mpegurl;

    ##
    # КЭШ И ЛИМИТЫ (Тот самый Fix)
    ##
    # Кэш для статуса Icecast
    proxy_cache_path /var/cache/nginx/icecast_stat levels=1:2 keys_zone=icecast_stat_cache:10m max_size=50m inactive=60m use_temp_path=off;
    
    # Зона лимитов для защиты сайта
    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

    ##
    # Virtual Host Configs
    ##
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
